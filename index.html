<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DevOS</title>
<style>
body { font-family: Arial; margin:0; display:flex; background:#f5f5f5; }
.sidebar { width:220px; background:white; padding:20px; height:100vh; }
.sidebar div { padding:10px; cursor:pointer; border-radius:8px; }
.active { background:black; color:white; }
.main { flex:1; padding:20px; }
.card { background:white; padding:15px; margin-bottom:10px; border-radius:12px; }
button { background:black; color:white; padding:8px; border:none; border-radius:8px; }
input { padding:8px; width:100%; margin-bottom:10px; }
</style>
</head>
<body>

<div class="sidebar">
  <div onclick="view='overview'; render()">Overview</div>
  <div onclick="view='feedback'; render()">Feedback</div>
  <div onclick="view='areas'; render()">Development</div>
  <div onclick="view='pathways'; render()">Pathways</div>
</div>

<div class="main" id="app"></div>

<script>
let view = "overview";
let feedback = [];
let areas = [];
let pathways = [];

function addFeedback(){
  let input = document.getElementById("input").value;
  if(!input) return;

  feedback.unshift(input);
  areas.unshift("Dev Area: " + input);
  pathways.unshift({
    title: input,
    steps:[{t:"Practice",d:false},{t:"Apply",d:false},{t:"Reflect",d:false}]
  });

  render();
}

function render(){
  let app = document.getElementById("app");

  if(view==="overview"){
    app.innerHTML = `
      <div class="card">Feedback: ${feedback.length}</div>
      <div class="card">Areas: ${areas.length}</div>
      <div class="card">Pathways: ${pathways.length}</div>
    `;
  }

  if(view==="feedback"){
    app.innerHTML = `
      <div class="card">
        <input id="input" placeholder="Enter feedback"/>
        <button onclick="addFeedback()">Add</button>
      </div>
      ${feedback.map(f=>`<div class="card">${f}</div>`).join("")}
    `;
  }

  if(view==="areas"){
    app.innerHTML = areas.map(a=>`<div class="card">${a}</div>`).join("");
  }

  if(view==="pathways"){
    app.innerHTML = pathways.map(p=>`
      <div class="card">
        <b>${p.title}</b>
        ${p.steps.map(s=>`
          <div>${s.t}</div>
        `).join("")}
      </div>
    `).join("");
  }
}

render();
</script>

</body>
</html>
